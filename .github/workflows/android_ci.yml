name: Android CI/CD

on:
  pull_request:
    branches:
      - master

jobs:
  test_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # Даем права на выполнение Gradle
      - name: Make gradlew executable
        run: chmod +x gradlew

      # 1. Запуск Detekt
      - name: Run Detekt
        run: ./gradlew detekt

      # 2. Запуск Unit-тестов
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest